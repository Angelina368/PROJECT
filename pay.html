<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата и выбор дизайна</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header class="header container">
        <img class="header__logo" src="images/logo.png" alt="Логотип">
        <h1 class="header__title">DesInteri</h1>
        <h2 class="header__subtitle">Онлайн-курс по дизайну интерьера</h2>
        <nav class="header__menu">
            <ul class="menu">
                <li class="menu__item"><a class="main__button" href="index.html">Главная страница</a></li>
                <li class="menu__item"><a class="main__button" href="cabinet.html">Личный кабинет</a></li>
                <li class="menu__item"><a class="main__button" href="course.html">Курсы</a></li>
                <li class="menu__item"><a class="main__button" href="pay.html">Оплатить курс</a></li>
                <li class="menu__item"><a class="main__button" href="catalog.html">Настройки сайтов</a></li>
                <li class="menu__item"><a class="main__button" href="registr.html">Вход/Регистрация</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="payment">
            <h2 class="payment__title">Оплата курса</h2>
            <form class="payment__form">
                <input type="text" name="course_selection" placeholder="Выбрать курс" required class="payment__input">
                <input type="text" name="payment_method" placeholder="Способ оплаты" required class="payment__input">
                <button type="submit" class="payment__button">Оплатить курс</button>
            </form>
        </section>

        <section class="fast-payment">
            <h2 class="fast-payment__title">Быстрая оплата</h2>
            <form class="fast-payment__form">
                <input type="text" name="fast_payment_system" placeholder="Система быстрой оплаты" required class="fast-payment__input">
                <input type="text" name="card_number" placeholder="Номер карты" required class="fast-payment__input">
                <button type="submit" class="fast-payment__button">Оплатить</button>
            </form>
        </section>


    </main>
</body>
</html>
